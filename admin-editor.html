<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Editor — My Portfolio</title>
<link rel="stylesheet" href="portfolio.css"/>
<style>
  .editor-wrap { max-width: 780px; margin: 0 auto; padding: 40px; }
  .tabs { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
  .tabs button { padding:8px 16px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; }
  .tabs button.active { background:var(--accent); border-color:var(--accent); }
  .panel { display:none; }
  .panel.active { display:block; }
  .item-row { border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:12px; }
  .item-row button { margin-right:8px; margin-top:8px; padding:6px 12px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; }
  label { display:block; margin-top:10px; margin-bottom:4px; color:var(--muted); font-size:0.9rem; }
  .save-msg { color: var(--accent); margin-top:10px; }
  .logout { float:right; }
</style>
</head>
<body>
<div class="editor-wrap">
  <h1>Content Editor <button class="logout" id="logoutBtn">Log out</button></h1>

  <div class="tabs">
    <button data-panel="home" class="active">Home</button>
    <button data-panel="resume">Resume &amp; Skills</button>
    <button data-panel="projects">Projects</button>
    <button data-panel="blog">Blog</button>
  </div>

  <!-- HOME -->
  <div class="panel active" id="panel-home">
    <label>Name</label>
    <input type="text" id="homeName"/>
    <label>Tagline</label>
    <input type="text" id="homeTagline"/>
    <label>About / Bio</label>
    <textarea id="homeBio" rows="6"></textarea>
    <button id="saveHome">Save Home</button>
    <p class="save-msg" id="homeMsg"></p>
  </div>

  <!-- RESUME -->
  <div class="panel" id="panel-resume">
    <label>Experience (one entry per line: "Role — Company — Years — Description")</label>
    <textarea id="resumeExperience" rows="6"></textarea>
    <label>Education (one entry per line: "Degree — School — Years")</label>
    <textarea id="resumeEducation" rows="4"></textarea>
    <label>Skills (comma separated)</label>
    <textarea id="resumeSkills" rows="3"></textarea>
    <button id="saveResume">Save Resume</button>
    <p class="save-msg" id="resumeMsg"></p>
  </div>

  <!-- PROJECTS -->
  <div class="panel" id="panel-projects">
    <h3>Add / Edit Project</h3>
    <input type="hidden" id="projectId"/>
    <label>Title</label>
    <input type="text" id="projectTitle"/>
    <label>Description</label>
    <textarea id="projectDesc" rows="3"></textarea>
    <label>Link (URL)</label>
    <input type="text" id="projectLink"/>
    <label>Image URL (optional)</label>
    <input type="text" id="projectImage"/>
    <button id="saveProject">Save Project</button>
    <button id="clearProjectForm" type="button">Clear / New</button>
    <p class="save-msg" id="projectMsg"></p>
    <h3>Existing Projects</h3>
    <div id="projectList"></div>
  </div>

  <!-- BLOG -->
  <div class="panel" id="panel-blog">
    <h3>Add / Edit Post</h3>
    <input type="hidden" id="postId"/>
    <label>Title</label>
    <input type="text" id="postTitle"/>
    <label>Content</label>
    <textarea id="postContent" rows="8"></textarea>
    <button id="savePost">Save Post</button>
    <button id="clearPostForm" type="button">Clear / New</button>
    <p class="save-msg" id="postMsg"></p>
    <h3>Existing Posts</h3>
    <div id="postList"></div>
  </div>
</div>
<script type="module" src="js/admin-editor.js"></script>
</body>
</html>
