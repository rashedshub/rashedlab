<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in — EMS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
        </svg>
      </div>
      <span class="brand-name">EMS</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue.</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn" id="loginBtn">
      <span class="btn-label">Log in</span>
      <span class="spinner"></span>
    </button>

    <p class="message" id="message"></p>

    <div class="switch">
      No account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
