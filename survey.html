<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Surveys — EMS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="dash-body">

  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
        </svg>
      </div>
      <span class="brand-name">EMS</span>
    </div>
    <div class="topbar-right">
      <a href="dashboard.html" style="font-size:0.875rem;color:var(--muted);text-decoration:none;margin-right:8px;">← Dashboard</a>
      <span class="user-badge" id="topbarEmail"></span>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </header>

  <main class="dash-main">
    <div class="welcome-block">
      <h1>Surveys</h1>
      <p>Please complete the surveys assigned to you.</p>
    </div>
    <div id="surveysArea">
      <div class="empty-state"><div class="empty-icon">📋</div>Loading surveys…</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script type="module" src="js/survey.js"></script>
</body>
</html>
