<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up — E&C</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
        </svg>
      </div>
      <span class="brand-name">E&C</span>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Fill in your details to get started.</p>

    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" placeholder="Rashedul Haque" autocomplete="name"/>
    </div>
    <div class="field">
      <label for="employeeId">Employee ID</label>
      <input type="text" id="employeeId" placeholder="30000000"/>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
    </div>

    <button class="btn" id="signupBtn">
      <span class="btn-label">Create account</span>
      <span class="spinner"></span>
    </button>

    <p class="message" id="message"></p>

    <div class="switch">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>

  <script type="module" src="js/signup.js"></script>
</body>
</html>
