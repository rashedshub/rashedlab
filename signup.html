<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up — Md. Rashedul Haque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portfolio.css"/>
</head>
<body>
  <section class="page-section" style="max-width:400px;">
    <h1>Create Account</h1>
    <form id="signupForm">
      <input type="text" id="name" placeholder="Your name" required/>
      <input type="email" id="email" placeholder="Email" required/>
      <input type="password" id="password" placeholder="Password (6+ characters)" required minlength="6"/>
      <button type="submit">Sign Up</button>
    </form>
    <p id="signupMsg"></p>
    <p>Already have an account? <a href="login.html">Log in</a></p>
    <p><a href="index.html">&larr; Back to site</a></p>
  </section>
  <script type="module" src="js/signup.js"></script>
</body>
</html>
