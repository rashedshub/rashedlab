  <section class="home-section" style="padding-top:72px;">
    <div class="inner">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;">Get in Touch</p>
        <h2>Contact</h2>
        <p>Have a dashboard, HR analytics, or automation project in mind? Let's talk.</p>
      </div>

      <div class="contact-grid">
        <div class="contact-info reveal">
          <div class="contact-detail">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 6 12 13 2 6"/><path d="M2 6h20v12H2z"/></svg>
            <div><span>Email</span>rhaque.eee@gmail.com</div>
          </div>
          <div class="contact-detail">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <div><span>Location</span>Savar, Dhaka-1340, Bangladesh</div>
          </div>
          <div class="contact-detail">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/><path d="M22 21v-6a4 4 0 0 0-8 0v6M14 21v-6a4 4 0 0 0-4-4"/></svg>
            <div><span>LinkedIn</span><a href="https://www.linkedin.com/in/rashedulhaque" target="_blank" rel="noopener">linkedin.com/in/rashedulhaque</a></div>
          </div>
          <div class="social-row">
            <a href="https://www.linkedin.com/in/rashedulhaque" target="_blank" rel="noopener" aria-label="LinkedIn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/><path d="M22 21v-6a4 4 0 0 0-8 0v6M14 21v-6a4 4 0 0 0-4-4"/></svg>
            </a>
            <a href="mailto:rhaque.eee@gmail.com" aria-label="Email">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 6 12 13 2 6"/><path d="M2 6h20v12H2z"/></svg>
            </a>
          </div>
          <div class="map-embed">
            <iframe title="Location map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps?q=Savar,Dhaka,Bangladesh&output=embed"></iframe>
          </div>
        </div>

        <div class="contact-form-card reveal">
          <form id="contactForm">
            <input type="text" id="contactName" placeholder="Your name" required/>
            <input type="email" id="contactEmail" placeholder="Your email" required/>
            <textarea id="contactMessage" rows="5" placeholder="Message" required></textarea>
            <button type="submit">Send Message</button>
          </form>
          <p id="contactMsg"></p>
        </div>
      </div>
